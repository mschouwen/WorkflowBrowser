<!DOCTYPE html>
<html>

<head>
    <title>Cytoscape HTML Tables</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://unpkg.com/cytoscape-node-html-label/dist/cytoscape-node-html-label.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Left Sidebar: List of Items -->
    <aside>
        <h3>Operations</h3>
        <input id="itemFilterInput" type="text" placeholder="Filter operations..." aria-label="Filter operations" />
        <ul id="itemList">
            <!-- Items will be populated by JavaScript -->
        </ul>
    </aside>

    <!-- Main Content: Canvas/Graph -->
    <main>
        <div id="toolbar">
            <nav id="mainMenu" aria-label="Application menu">
                <div class="ribbon-group" role="group" aria-label="Workflow actions">
                    <span class="ribbon-group-title">Workflow</span>
                    <div class="ribbon-buttons">
                        <button type="button" id="createWorkflowMenuItem" class="ribbon-btn" disabled
                            title="Not wired yet">Create</button>
                        <button type="button" id="deleteWorkflowMenuItem" class="ribbon-btn" disabled
                            title="Not wired yet">Delete</button>
                        <button type="button" id="saveWorkflowMenuItem" class="ribbon-btn">Save</button>
                    </div>
                </div>
                <div class="ribbon-group" role="group" aria-label="Node actions">
                    <span class="ribbon-group-title">Nodes</span>
                    <div class="ribbon-buttons">
                        <button type="button" id="connectionModeBtn" class="ribbon-btn">Connect node</button>
                        <button type="button" id="deleteNodeMenuItem" class="ribbon-btn">Delete node</button>
                        <div class="ribbon-drag-item" draggable="true" data-item-name="Add Choice"
                            data-item-label="Add Choice" data-item-kind="custom-node" data-item-type="choice">Add Choice
                        </div>
                        <div class="ribbon-drag-item" draggable="true" data-item-name="Add choice junction"
                            data-item-label="Add choice junction" data-item-kind="custom-node"
                            data-item-type="choicejunction">Add choice junction</div>
                    </div>
                </div>
            </nav>
        </div>
        <div id="cy"></div>
    </main>

    <!-- Resize handle -->
    <div id="resizeHandle"></div>

    <!-- Bottom Bar with Three Panels -->
    <footer id="bottomBar">
        <div id="bottomPanels">
            <div id="panel1" class="bottom-panel">
                <h4>Node Parameters</h4>
                <!-- title and editable display name -->
                <div id="parametersHeader" class="panel-header">
                    <span id="parametersTitle" class="parameters-title">No operation</span>
                    <input id="displayNameInput" class="display-name-input" type="text" placeholder="Display name" />
                </div>
                <div id="parametersContainer" class="panel-content">
                    <p class="empty-state-text">No node selected</p>
                </div>
            </div>
            <div id="panel2" class="bottom-panel">
                <h4>Metadata Parameters</h4>
                <div id="metadataParametersContainer" class="panel-content">
                    <p class="empty-state-text">No metadata available</p>
                </div>
            </div>
            <div id="panel3" class="bottom-panel">
                <h4>Panel 3</h4>
                <div class="panel-content">
                    <!-- Empty for now -->
                </div>
            </div>
        </div>
    </footer>

    <!-- Modal dialog for parameter selection -->
    <div id="paramDialog" class="modal">
        <div class="modal-content">
            <span id="modalClose" class="modal-close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="graph-setup.js"></script>
    <script src="choice-resize.js"></script>
    <script src="parameters-ui.js"></script>
    <script src="interactions.js"></script>
</body>

</html>
